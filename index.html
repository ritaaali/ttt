<link rel="manifest" id="manifest-link">

<style>
  @font-face { font-family: 'NotoSerifTC'; src: local('Noto Serif CJK TC'); }
  @font-face { font-family: 'NotoSansTC'; src: local('Noto Sans CJK TC'); }

  :root{
    --paper: #EFEDE6;
    --card: #FAF9F5;
    --ink: #21201C;
    --ink-soft: #55524A;
    --line: #DCD7C9;

    --blue: #2C4A6E;   --blue-bg: #E3EAF1;
    --purple:#4A3768;  --purple-bg:#E9E3EF;
    --green: #2E5C46;  --green-bg:#E1EBE3;
    --brown: #6B4A2E;  --brown-bg:#EFE6DA;
    --gold: #8A6D1D;   --gold-bg:#F1E7CB;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'NotoSansTC', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body{
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 40px) 0;
  }

  .wrap{ max-width: 720px; margin: 0 auto; padding: 0 20px; }

  header.top{
    padding: 28px 20px 20px 20px;
    text-align:center;
    border-bottom: 3px solid var(--ink);
    background: var(--paper);
    position: sticky; top:0; z-index: 5;
  }
  header.top .eyebrow{
    font-size: 12px; letter-spacing: 4px; color: var(--ink-soft); font-weight:700; margin-bottom:6px;
  }
  header.top h1{
    font-family:'NotoSerifTC', serif; font-size: 26px; margin:0; font-weight:700;
  }
  header.top .sub{ font-size:13px; color:var(--ink-soft); margin-top:6px; }

  /* 天賦速覽 */
  .talents-section{ margin: 22px 0 8px 0; }
  .talents-title{
    font-family:'NotoSerifTC',serif; font-size:18px; font-weight:700; margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .talents-title .bar{ width:6px; height:18px; background:var(--ink); border-radius:2px; }
  .talent-scroll{
    display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; -webkit-overflow-scrolling: touch;
  }
  .talent-chip{
    flex: 0 0 auto;
    min-width: 92px;
    background: var(--card);
    border: 1px solid var(--line);
    border-top: 5px solid var(--accent);
    border-radius: 10px;
    padding: 12px 14px;
    text-align:center;
  }
  .talent-chip .rank{ font-size:11px; color:var(--ink-soft); font-weight:700; }
  .talent-chip .zh{ font-family:'NotoSerifTC',serif; font-size:20px; font-weight:700; margin:4px 0 2px 0; }
  .talent-chip .en{ font-size:10px; color:var(--ink-soft); font-style:italic; }

  /* 表單卡片 */
  .form-card{
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 12px;
    margin: 22px 0;
    padding: 22px 20px 26px 20px;
  }

  .report-card{
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 12px;
    margin: 18px 0;
    padding: 22px 20px 24px 20px;
  }
  .report-card.alt{ background:#F3F1EA; }
  .report-title{
    font-family:'NotoSerifTC',serif; font-weight:700; font-size:17px;
    margin-bottom: 18px; color: var(--ink);
  }

  .domain-row{
    display:flex; align-items:center; gap:12px; margin-bottom:16px;
  }
  .domain-row .d-name{ width:64px; font-size:13.5px; font-weight:700; flex-shrink:0; }
  .domain-row .d-track{
    flex:1; background:#E7E4DA; border-radius:6px; height:10px; overflow:hidden;
  }
  .domain-row .d-fill{ height:100%; border-radius:6px; }
  .domain-row .d-val{ font-size:12px; color:var(--ink-soft); flex-shrink:0; width:74px; text-align:right; }

  .combo-item{
    padding: 12px 0; border-bottom: 1px solid var(--line);
  }
  .combo-item:last-child{ border-bottom:none; }
  .combo-item .combo-tag{
    display:inline-block; font-size:11px; font-weight:700; color:#fff;
    background: var(--green); padding:2px 10px; border-radius:12px; margin-right:8px;
  }
  .combo-item .combo-pair{ font-weight:700; font-size:14.5px; }
  .combo-item .combo-desc{ font-size:13.5px; line-height:1.7; color:var(--ink-soft); margin-top:6px; }

  .career-text{ font-size:14.5px; line-height:1.8; margin-bottom:14px; }
  #careerTags .tm-tag{ color: var(--gold); background: var(--gold-bg); }
  .form-card .section-label{
    display:inline-block;
    font-size: 13px; font-weight:700; letter-spacing:1px;
    padding: 4px 14px; border-radius: 20px;
    margin-bottom: 14px;
  }
  .label-1{ color: var(--blue); background: var(--blue-bg); }
  .label-2{ color: var(--purple); background: var(--purple-bg); }

  .form-card h2{
    font-family:'NotoSerifTC',serif; font-size:21px; margin: 0 0 18px 0;
  }

  .q{ margin-bottom: 20px; }
  .q label{
    display:block; font-size:15px; font-weight:700; margin-bottom:8px; line-height:1.6;
  }
  .q .hint{ font-size:12.5px; color:var(--ink-soft); margin-bottom:8px; display:block; font-weight:400;}
  textarea, input[type="text"], input[type="date"]{
    width:100%;
    font-family:'NotoSansTC',sans-serif;
    font-size:16px;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background:#fff;
    color: var(--ink);
    resize: vertical;
    line-height:1.6;
  }
  textarea{ min-height: 88px; }
  textarea:focus, input:focus{ outline:2px solid var(--blue); outline-offset: 1px; }

  .week-row{
    display:flex; align-items:center; gap:12px; margin-bottom: 18px;
  }
  .week-row label{ font-size:14px; font-weight:700; white-space:nowrap; }
  .week-row input{ flex:1; }

  .save-bar{
    position: sticky; bottom: 0;
    background: linear-gradient(to top, var(--paper) 60%, transparent);
    padding: 16px 20px calc(10px + env(safe-area-inset-bottom)) 20px;
    margin: 0 -20px;
  }
  button.save-btn{
    width:100%;
    background: var(--ink);
    color:#fff;
    border:none;
    border-radius: 12px;
    padding: 16px;
    font-size:17px;
    font-weight:700;
    font-family:'NotoSansTC',sans-serif;
    letter-spacing: 1px;
  }
  button.save-btn:active{ opacity:0.8; }

  .toast{
    position: fixed; bottom: 90px; left:50%; transform: translateX(-50%);
    background: var(--green); color:#fff; padding: 10px 22px; border-radius: 30px;
    font-size:14px; opacity:0; pointer-events:none; transition: opacity .25s ease;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
  }
  .toast.show{ opacity:1; }

  /* 歷史紀錄 */
  .history-title{
    font-family:'NotoSerifTC',serif; font-size:19px; font-weight:700; margin: 34px 0 14px 0;

<body>

<header class="top">
  <div class="eyebrow">天賦導航工作坊初階・周日班第二堂</div>
  <h1>#回家練習</h1>
  <div class="sub">天賦覺察 × 天賦VS價值觀</div>
</header>

<div class="wrap">

  <div class="talents-section">
    <div class="talents-title"><span class="bar" style="background:var(--green)"></span>我的優勢特質 Top 8　<span style="font-size:11px;color:var(--ink-soft);font-weight:400;">（點卡片看詳細內容）</span></div>
    <div class="talent-scroll" id="talentScroll"></div>
  </div>

  <div class="talents-section">
    <div class="talents-title"><span class="bar" style="background:var(--gold)"></span>我的價值觀 Top 5</div>
    <div class="talent-scroll" id="valueScroll"></div>
  </div>

  <div class="report-card">
    <div class="report-title">✦ 領域分佈</div>
    <div id="domainBars"></div>
  </div>

  <div class="report-card alt">
    <div class="report-title">✦ 天賦組合詮釋</div>
    <div id="comboList"></div>
  </div>

  <div class="report-card">
    <div class="report-title">✦ 職涯方向建議</div>
    <p class="career-text" id="careerText"></p>
    <div class="tm-tags" id="careerTags"></div>
  </div>

  <div class="form-card">
    <div class="week-row">
      <label for="weekDate">📅 本週日期</label>
      <input type="date" id="weekDate">
    </div>

    <div class="section-label label-1">一、天賦覺察練習</div>
    <h2>卡住時的覺察</h2>

    <div class="q">
      <label>(1) 我現在是哪一個天賦「過度使用」了？</label>
      <textarea id="q1" placeholder="例如：謹慎過度，讓我遲遲不敢行動⋯"></textarea>
    </div>

    <div class="q">
      <label>(2) 我可以做一個「微小」的改變，或用另一個天賦來支援？</label>
      <textarea id="q2" placeholder="例如：用『行動』天賦，先踏出一小步試試看⋯"></textarea>
    </div>

    <div class="q">
      <label>(3) 有什麼發現？</label>
      <textarea id="q3" placeholder="寫下你的覺察⋯"></textarea>
    </div>
  </div>

  <div class="form-card">
    <div class="section-label label-2">二、天賦 VS 價值觀練習</div>
    <h2>價值觀的餵養</h2>

    <div class="q">
      <label>1. 這週的我用了哪項天賦？滿足了我哪些價值觀？</label>
      <textarea id="q4" placeholder="例如：用了『伯樂』陪一位同事討論，滿足了我對『成長』與『貢獻』的價值觀⋯"></textarea>
    </div>

    <div class="q">
      <label>2. 挑選一個目前「最匱乏」的價值觀，嘗試用你的某些天賦去餵養它，看看有什麼發現？</label>
      <textarea id="q5" placeholder="例如：我最匱乏『被肯定』，我打算用『完美』把一件小事做到精緻，讓自己被看見⋯"></textarea>
    </div>
  </div>

  <div class="save-bar">
    <button class="save-btn" id="saveBtn">儲存這週的作業</button>
  </div>

  <div class="history-title">
    歷次紀錄 <span class="count" id="historyCount"></span>
  </div>

  <div class="export-import-bar">
    <button class="io-btn" id="exportBtn">⬇ 匯出備份</button>
    <button class="io-btn" id="importBtn">⬆ 匯入備份</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none;">
  </div>

  <div id="historyList"></div>

</div>

<div class="toast" id="toast">已儲存 ✓</div>

<div id="talentModal">
  <div class="modal-backdrop" id="talentModalBackdrop"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close" id="talentModalClose">✕</button>
    <div id="talentModalBody"></div>
  </div>
</div>

<script>
  // ---------- 8 項優勢資料（供上方速覽卡片使用）----------
  const TALENTS = [
    {rank:1, zh:"謹慎", en:"Deliberative", domain:"執行力", score:20, accent:"var(--blue)", accentBg:"var(--blue-bg)",
     def:"做決定前會先停下來評估風險，習慣思考可能的問題、隱藏成本與不確定因素，不會輕易衝動行事。",
     why:["通常不會太快答應，因為你會先衡量後果","重視安全感與可信任的環境","對細節與潛在風險有很高敏感度"],
     success:"能幫團隊在行動前看見盲點，避免因過度樂觀或倉促而犯錯。你提供的是穩健，而不是拖延。",
     actions:["在重大決策中擔任風險評估者","提前規劃備案與風險應對","與尊重你節奏的人合作","把你看到的風險說清楚，也盡量附上建議方案"],
     blind:["可能被他人解讀為保守、悲觀或慢","若太強調風險，可能錯失機會","有時會因想太完整而遲遲不行動"],
     summary:"謹慎的核心是「先看風險，再走得穩」。當你把小心與適度行動結合，會是很可靠的判斷者。",
     core2:"在決定行動之前，腦子會自動掃描可能出錯的地方。這不是悲觀，是一種預防機制。當別人準備直接行動，你還在確認有沒有漏掉什麼。信息不夠充分時，本能是等待而不是前進。",
     actions2:["主動承擔風險評估的角色——你的謹慎是團隊的護城河，讓大家少走彎路。","設定一個「夠用的資訊線」——當風險可接受了，練習說出「可以行動了」。","你的小心謹慎讓你很可靠，讓重要的人知道他們可以依賴你把事情想周全。"],
     blind2:["評估太久有時讓你錯過需要快速抓住的機會，學習辨識什麼時候「夠好就行動」。","你對不確定性的抗拒，有時讓別人感到被拖慢，需要找到節奏上的協調。","不是所有情況都需要最完整的評估——學習根據決策的重要性調整評估的深度。"],
     directions:["風險管理","財務規劃","法務","品質保證"]},

    {rank:2, zh:"伯樂", en:"Developer", domain:"關係建立", score:20, accent:"var(--green)", accentBg:"var(--green-bg)",
     def:"喜歡看見他人成長，尤其擅長注意到細微進步。別人可能還沒看見自己的可能性時，你已經能看見。",
     why:["會自然對他人的潛力感到興趣","對小進步非常敏感，且真心為此高興","常在關係中扮演鼓勵者、教練或培育者角色"],
     success:"能讓人感到被看見、被相信，這會明顯提升他們的成長動機。你帶來的不只是支持，而是成長感。",
     actions:["列出你真正想培育的人，固定投入時間","給需要鼓勵的人更具體的回饋","把焦點放在有成長意願的人身上","不要忘記同時投資自己的發展"],
     blind:["可能對他人的成長過度投入，甚至替對方扛責任","若對方一直沒有行動，你可能耗損很大","容易把太多注意力放在別人身上，而忽略自己"],
     summary:"伯樂的核心是「看見潛力、陪伴成長」。當你把鼓勵與界線放在一起，培育效果會更健康。",
     core2:"和人互動時，會自動注意對方還沒被發揮出來的部分。看到有人進步了一點，哪怕很小，會有一種真實的興奮。這個驅動力是針對潛力的，而不是針對結果的——對方願不願意成長，會直接影響你的投入感。",
     actions2:["列出你想輔導的人，定期和他們見面討論他們的目標——就算只有幾分鐘也好。","把你觀察到的進步說給對方聽，他們需要知道你看見了——你的話可能是他們繼續前進的動力。","幫助掙扎中的人找到更適合他們的位置，而不是只在原地努力——有時最好的伯樂是指引方向。"],
     blind2:["可能過度在意某人的成長，覺得如果他們遭遇困難是自己的責任——有時最好是讓他們自己走。","投入太多時間在他人身上，有時讓你忘記投資於自己的發展——先照顧好自己才能幫助別人。","在對方還沒準備好的時候就介入太深，反而造成壓力——學習辨識對方什麼時候真的需要你。"],
     directions:["教師與教練","人才培育","心理諮詢","HR與組織發展"]},

    {rank:3, zh:"同理", en:"Empathy", domain:"關係建立", score:20, accent:"var(--green)", accentBg:"var(--green-bg)",
     def:"能感受到他人的情緒，常常在對方還沒完整說出來前，就已經接收到那份感受。不是只理解內容，也理解感覺。",

     actions2:["在一次困難對話後，花5分鐘獨處回到自己的感受——讓自己有機會從吸收到的情緒中恢復。","練習說：「我理解你的感受，同時我也需要說……」——讓同理和你自己的聲音都被聽見。","尋找需要深度人際理解的角色，讓你的同理心成為你最大的貢獻，而不是消耗。"],
     blind2:["容易吸收他人情緒而感到消耗，在高密度的人際互動後需要時間獨處才能恢復。","難以保持客觀距離，有時讓你在需要清晰判斷的情況下被情緒主導。","把同理用來迴避困難的直接對話——有時對方需要的不是被理解，而是清楚的回饋。"],

     why:["重視信任建立，而不是快速熟絡","和熟悉的人一起工作時，會投入得更深、更久","傾向珍惜長期而真實的友誼"],

     directions:["長期顧問","合夥人關係","研究工作","需要深度信任的長期合作"]},

    {rank:5, zh:"責任", en:"Responsibility", domain:"執行力", score:19, accent:"var(--blue)", accentBg:"var(--blue-bg)",
     def:"一旦答應，就會把承諾當成自己的事。對誠信、可靠與完成承諾有很高的內在要求，不容易把承諾看得輕。",

  // ---------- localStorage 存取 ----------
  const STORAGE_KEY = 'talent_homework_entries_v1';

  function loadEntries(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveEntries(entries){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function showToast(msg, type){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? (' ' + type) : '');
    setTimeout(()=>{ t.classList.remove('show'); }, 2000);
  }

  function renderHistory(){
    const entries = loadEntries().sort((a,b)=> b.date.localeCompare(a.date));
    const list = document.getElementById('historyList');
    const countEl = document.getElementById('historyCount');
    countEl.textContent = entries.length ? `共 ${entries.length} 筆` : '';
    list.innerHTML = '';

    if(entries.length === 0){
      list.innerHTML = '<div class="empty-hint">還沒有紀錄，填完上面的作業按下「儲存」就會出現在這裡。</div>';
      return;
    }

    entries.forEach(en=>{
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="h-date">${en.date} <button class="del-btn" data-id="${en.id}">刪除</button></div>
        <div class="h-q">(1) 過度使用的天賦</div><div class="h-a">${escapeHtml(en.q1)||'—'}</div>
        <div class="h-q">(2) 微小改變 / 支援天賦</div><div class="h-a">${escapeHtml(en.q2)||'—'}</div>
        <div class="h-q">(3) 發現</div><div class="h-a">${escapeHtml(en.q3)||'—'}</div>
        <div class="h-q">用了哪項天賦 / 滿足哪些價值觀</div><div class="h-a">${escapeHtml(en.q4)||'—'}</div>
        <div class="h-q">餵養最匱乏的價值觀</div><div class="h-a">${escapeHtml(en.q5)||'—'}</div>
      `;
      list.appendChild(item);
    });

    document.querySelectorAll('.del-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(!confirm('確定要刪除這筆紀錄嗎？')) return;
        const id = btn.getAttribute('data-id');
        const remaining = loadEntries().filter(e=>e.id !== id);
        saveEntries(remaining);
        renderHistory();
      });
    });
  }

  function escapeHtml(str){
    if(!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const entry = {
      id: Date.now().toString(),
      date: dateInput.value || today.toISOString().slice(0,10),
      q1: document.getElementById('q1').value.trim(),
      q2: document.getElementById('q2').value.trim(),
      q3: document.getElementById('q3').value.trim(),
      q4: document.getElementById('q4').value.trim(),
      q5: document.getElementById('q5').value.trim(),
    };
    if(!entry.q1 && !entry.q2 && !entry.q3 && !entry.q4 && !entry.q5){
      showToast('先寫點什麼再儲存喔');
      return;
    }
    const entries = loadEntries();
    entries.push(entry);
    saveEntries(entries);

    ['q1','q2','q3','q4','q5'].forEach(id => document.getElementById(id).value = '');
    showToast('已儲存 ✓');
    renderHistory();
  });

  // ---------- 匯出備份 ----------
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const entries = loadEntries();
    if(entries.length === 0){
      showToast('目前還沒有紀錄可以匯出', 'error');
      return;
    }
    const payload = {
      app: '天賦導航工作坊回家作業',
      exportedAt: new Date().toISOString(),
      talents: TALENTS.map(t=>({rank:t.rank, zh:t.zh, en:t.en})),
      values: VALUES,
      entries: entries
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = '天賦作業備份_' + stamp + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    showToast('已匯出備份檔案 ✓');
  });

  document.getElementById('importFile').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(evt){
      let data;
      try{
        data = JSON.parse(evt.target.result);
      }catch(err){
        showToast('這個檔案格式看起來不對喔', 'error');
        e.target.value = '';
        return;
      }
      const importedEntries = Array.isArray(data) ? data : (Array.isArray(data.entries) ? data.entries : null);
      if(!importedEntries){
        showToast('找不到可匯入的紀錄', 'error');
        e.target.value = '';
        return;
      }
      const existing = loadEntries();
      const existingIds = new Set(existing.map(x=>x.id));
      let added = 0;
      importedEntries.forEach(imp=>{
        if(imp && typeof imp === 'object'){
          const id = imp.id ? String(imp.id) : Date.now().toString() + Math.random().toString(36).slice(2,7);
          if(!existingIds.has(id)){
            existing.push({
              id: id,
              date: imp.date || '',
              q1: imp.q1 || '', q2: imp.q2 || '', q3: imp.q3 || '',
              q4: imp.q4 || '', q5: imp.q5 || ''
            });
            existingIds.add(id);
            added++;
          }
        }
